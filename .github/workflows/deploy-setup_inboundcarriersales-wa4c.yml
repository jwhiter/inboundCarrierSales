# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - inboundCarrierSales-WA4C

on:
  push:
    branches:
      - deploy-setup
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: inboundcarriersalesacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_28B78BF70A7D4DD3BA72770633C17E7B }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_DE8536FB09DA433887B397C48B7834CC }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: inboundcarriersalesacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_28B78BF70A7D4DD3BA72770633C17E7B }}/inbound-carrier-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7D84CA1F4F7C4A2DA34D7D7864114BB6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C071F401D98F4FD2A6D3DA8F05F8BA1C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_53505CE2624B489DBFB13D30D1471FCC }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'inboundCarrierSales-WA4C'
          slot-name: 'Production'
          images: 'inboundcarriersalesacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_28B78BF70A7D4DD3BA72770633C17E7B }}/inbound-carrier-api:${{ github.sha }}'
          